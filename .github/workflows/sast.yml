name: SAST PR Scan

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  semgrep:
    name: Semgrep (PHP + Go)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep (diff-aware)
        env:
          SEMGREP_BASELINE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/php \
            --config p/golang \
            --config p/secrets \
            --baseline-commit $SEMGREP_BASELINE_REF \
            --sarif --output semgrep-results.sarif

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  gosec:
    name: GoSec (Go specialist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Get changed Go directories
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '*.go' | head -500)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            # Find Go module roots for changed files
            MODROOTS=""
            for f in $FILES; do
              dir=$(dirname "$f")
              while [ "$dir" != "." ]; do
                if [ -f "$dir/go.mod" ]; then
                  MODROOTS="$MODROOTS $dir"
                  break
                fi
                dir=$(dirname "$dir")
              done
            done
            MODROOTS=$(echo "$MODROOTS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "modroots=$MODROOTS" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoSec on changed Go modules
        if: steps.changed.outputs.skip == 'false'
        run: |
          EXIT_CODE=0
          for modroot in ${{ steps.changed.outputs.modroots }}; do
            echo "::group::Scanning ${modroot}"
            cd "$modroot"
            go mod tidy
            gosec -fmt json -out "$GITHUB_WORKSPACE/gosec-${modroot//\//-}.json" ./... || EXIT_CODE=1
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
          # Build PR comment
          COMMENT="## GoSec Scan Results\n\n"
          TOTAL=0
          for f in gosec-*.json; do
            [ -f "$f" ] || continue
            COUNT=$(jq '.Issues | length' "$f")
            TOTAL=$((TOTAL + COUNT))
            if [ "$COUNT" -gt 0 ]; then
              ISSUES=$(jq -r '.Issues[]? | "| `\(.file)` | \(.line) | \(.rule_id) | \(.severity) | \(.details) |"' "$f")
              COMMENT="${COMMENT}${ISSUES}\n"
            fi
          done
          if [ "$TOTAL" -gt 0 ]; then
            HEADER="| File | Line | Rule | Severity | Details |\n|---|---|---|---|---|\n"
            COMMENT="## GoSec Scan Results\n\n**$TOTAL issue(s) found**\n\n${HEADER}${ISSUES}\n"
          else
            COMMENT="## GoSec Scan Results\n\nNo issues found."
          fi
          echo -e "$COMMENT" > gosec-comment.md
          # Also show as annotations
          for f in gosec-*.json; do
            [ -f "$f" ] || continue
            jq -r '.Issues[]? | "::warning file=\(.file),line=\(.line)::GoSec [\(.rule_id)] \(.details)"' "$f"
          done
          exit $EXIT_CODE

      - name: Comment GoSec results on PR
        if: always() && steps.changed.outputs.skip == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: gosec-results
          path: gosec-comment.md

  psalm:
    name: Psalm Taint Analysis (PHP specialist)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: php-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --no-interaction || true

      - name: Check for changed PHP files
        id: changed
        working-directory: .
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '*.php')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$FILES" > changed_php_files.txt
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Psalm taint analysis
        if: steps.changed.outputs.skip == 'false'
        run: |
          vendor/bin/psalm \
            --taint-analysis \
            --output-format=json \
            --report=psalm-results.json \
            $(cat ../changed_php_files.txt | sed 's|php-app/||g' | tr '\n' ' ') || true
          # Build PR comment file
          echo "## Psalm Taint Analysis Results" > ../psalm-comment.md
          echo "" >> ../psalm-comment.md
          if [ -f psalm-results.json ] && jq -e '.' psalm-results.json > /dev/null 2>&1; then
            COUNT=$(jq 'length' psalm-results.json)
            if [ "$COUNT" -gt 0 ]; then
              echo "**${COUNT} issue(s) found**" >> ../psalm-comment.md
              echo "" >> ../psalm-comment.md
              echo "| File | Line | Type | Message |" >> ../psalm-comment.md
              echo "|---|---|---|---|" >> ../psalm-comment.md
              jq -r '.[]? | "| `\(.file_name)` | \(.line_from) | \(.type) | \(.message) |"' psalm-results.json >> ../psalm-comment.md
              exit 1
            else
              echo "No issues found." >> ../psalm-comment.md
            fi
          else
            echo "No issues found." >> ../psalm-comment.md
          fi

      - name: Comment Psalm results on PR
        if: always() && steps.changed.outputs.skip == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: psalm-results
          path: psalm-comment.md

  trivy:
    name: Trivy (Dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dependency files changed
        id: changed
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '**/go.sum' '**/go.mod' '**/composer.lock' '**/composer.json')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        if: steps.changed.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
