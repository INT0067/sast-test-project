name: SAST PR Scan

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  semgrep:
    name: Semgrep (PHP + Go)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep (diff-aware)
        env:
          SEMGREP_BASELINE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/php \
            --config p/golang \
            --config p/secrets \
            --baseline-commit $SEMGREP_BASELINE_REF \
            --sarif --output semgrep-results.sarif

      - name: Upload results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  gosec:
    name: GoSec (Go specialist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Get changed Go directories
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '*.go' | head -500)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            # Find Go module roots for changed files
            MODROOTS=""
            for f in $FILES; do
              dir=$(dirname "$f")
              while [ "$dir" != "." ]; do
                if [ -f "$dir/go.mod" ]; then
                  MODROOTS="$MODROOTS $dir"
                  break
                fi
                dir=$(dirname "$dir")
              done
            done
            MODROOTS=$(echo "$MODROOTS" | tr ' ' '\n' | sort -u | tr '\n' ' ')
            echo "modroots=$MODROOTS" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoSec on changed Go modules
        if: steps.changed.outputs.skip == 'false'
        run: |
          EXIT_CODE=0
          for modroot in ${{ steps.changed.outputs.modroots }}; do
            echo "::group::Scanning ${modroot}"
            cd "$modroot"
            go mod tidy
            gosec -fmt json -out "$GITHUB_WORKSPACE/gosec-${modroot//\//-}.json" ./... || EXIT_CODE=1
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
          # Show findings as GitHub annotations
          for f in gosec-*.json; do
            [ -f "$f" ] || continue
            echo "=== Issues found: $(jq '.Issues | length' "$f") ==="
            jq -r '.Issues[]? | "::warning file=\(.file),line=\(.line)::GoSec [\(.rule_id)] \(.details)"' "$f"
          done
          exit $EXIT_CODE

  psalm:
    name: Psalm Taint Analysis (PHP specialist)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: php-app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --no-interaction || true

      - name: Check for changed PHP files
        id: changed
        working-directory: .
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '*.php')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "$FILES" > changed_php_files.txt
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Psalm taint analysis
        if: steps.changed.outputs.skip == 'false'
        run: |
          vendor/bin/psalm \
            --taint-analysis \
            --output-format=github \
            $(cat ../changed_php_files.txt | sed 's|php-app/||g' | tr '\n' ' ') || true

  trivy:
    name: Trivy (Dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dependency files changed
        id: changed
        run: |
          FILES=$(git diff --name-only \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            -- '**/go.sum' '**/go.mod' '**/composer.lock' '**/composer.json')
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        if: steps.changed.outputs.skip == 'false'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
